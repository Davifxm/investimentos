<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Investimentos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header><h1>Simulador de Investimentos</h1></header>
        
        <main class="dashboard">
            <section class="controls card">
                <h3>Entradas do caso real</h3>
                <div class="input-group">
                    <label>Investimento Inicial (R$)</label>
                    <input type="number" id="initial" value="300">
                </div>
                <div class="input-group">
                    <label>Aporte Mensal (R$)</label>
                    <input type="number" id="monthly" value="300">
                </div>
                <div class="input-group">
                    <label>Horizonte (Anos)</label>
                    <input type="number" id="years" value="20">
                </div>
                <button onclick="calculate()">Simular</button>
            </section>

            <section class="kpis">
                <div class="kpi card"><span>Total Aportado</span><h2 id="totalInvested">R$ 0</h2></div>
                <div class="kpi card"><span>Melhor Saldo</span><h2 id="bestReturn">R$ 0</h2></div>
                <div class="kpi card"><span>Pior Saldo</span><h2 id="worstReturn">R$ 0</h2></div>
            </section>

            <section class="chart-container card">
                <canvas id="investmentChart"></canvas>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
